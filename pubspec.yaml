name: cq_app
description: CQ即时通讯客户端
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # 状态管理
  provider: ^6.1.1
  
  # 网络请求
  dio: ^5.4.0
  
  # WebSocket
  web_socket_channel: ^2.4.0
  
  # 本地存储
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # 图片处理
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  
  # 权限
  permission_handler: ^11.2.0
  
  # 工具类
  intl: ^0.20.2
  uuid: ^4.3.3
  crypto: ^3.0.3
  json_annotation: ^4.8.1
  equatable: ^2.0.5
  
  # UI组件
  flutter_easyloading: ^3.0.5
  pull_to_refresh: ^2.0.0
  badges: ^3.1.2
  photo_view: ^0.14.0
  emoji_picker_flutter: ^1.6.4
  flutter_spinkit: ^5.2.2
  
  # 版本更新
  package_info_plus: ^5.0.1
  url_launcher: ^6.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

dependency_overrides:
  flutter_spinkit: ^5.2.2

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
